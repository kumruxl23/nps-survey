{% extends "base.html" %}
{% block title %}NPS Dashboard{% endblock %}
{% block content %}
<div id="asanaBanner" class="alert alert-warning d-none d-flex justify-content-between align-items-center" role="alert">
  <div><strong>ASANA not connected.</strong> Survey responses can't sync until an admin authorizes ASANA.</div>
  <a href="/nps/auth/asana" class="btn btn-sm btn-warning">Connect ASANA</a>
</div>
<div id="loading" class="text-center my-5"><div class="spinner-border text-success"></div></div>
<div id="main" class="d-none">

<!-- Stat summary row -->
<div class="stat-row" id="statRow"></div>

<!-- Org tabs (clickable) -->
<ul class="nav nav-tabs org-tabs mb-3" id="orgTabs" role="tablist"></ul>

<!-- Filter bar (inside tab content) -->
<div class="filter-bar mb-3" id="filterBar">
  <div class="row g-2 align-items-center">
    <div class="col-auto"><strong>Filters</strong></div>
    <div class="col-md-2">
      <select class="form-select form-select-sm" id="fCycle"><option value="">All Cycles</option></select>
    </div>
    <div class="col-md-2">
      <select class="form-select form-select-sm" id="fLeader"><option value="">All Leaders</option></select>
    </div>
    <div class="col-md-2">
      <select class="form-select form-select-sm" id="fCategory">
        <option value="">All Categories</option>
        <option value="Promoter">Promoters</option>
        <option value="Passive">Passives</option>
        <option value="Detractor">Detractors</option>
      </select>
    </div>
    <div class="col-auto">
      <button class="btn btn-sm btn-outline-danger" id="btnClear">Clear All</button>
    </div>
  </div>
</div>

<!-- Tab content -->
<div class="tab-content" id="tabContent"></div>
</div>

<!-- Pending Stakeholders Modal (used for "View Pending" button) -->
<div class="modal fade" id="pendingModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Pending Stakeholders</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div id="pendingModalBody"><div class="text-center"><div class="spinner-border text-success"></div></div></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function(){
  const loading=document.getElementById('loading'),main=document.getElementById('main');
  const tabsEl=document.getElementById('orgTabs'),contentEl=document.getElementById('tabContent');
  const statRow=document.getElementById('statRow');
  const fCycle=document.getElementById('fCycle'),fLeader=document.getElementById('fLeader'),fCategory=document.getElementById('fCategory');
  let DATA={summary:null,orgs:[],orgMap:{},activeOrg:null};

  async function F(u){const r=await fetch(u);if(!r.ok)throw new Error(r.status);return r.json();}
  function pct(c,t){return t?((c/t)*100).toFixed(1):'0.0';}
  function nc(s){return s>=50?'text-success':s>=0?'text-warning':'text-danger';}
  function cn(s){return s.cycle_name||(s.start_date?s.start_date+' - '+s.end_date:(s.cycle_id||'').substring(0,8));}

  // ----- Historical Data (hardcoded, source TBD) -----
  // Covers H1 2024 through H2 2025. Live H1 2026 data comes from DynamoDB
  // and is shown elsewhere (top stats + leader table). Numbers from team
  // workbook screenshots; replace with workbook-driven import when ready.
  const HISTORICAL_DATA={
    whs_cpt_in:{
      label:'CPT-IN',
      rows:[
        {period:'2024 H1',nominated:112,responded:60, detractor:1,passive:5, promoter:54, rr:53.57,nps:88.33},
        {period:'2024 H2',nominated:137,responded:122,detractor:2,passive:17,promoter:103,rr:89.05,nps:82.79},
        {period:'2025 H1',nominated:91, responded:82, detractor:1,passive:10,promoter:71, rr:90.11,nps:85.37},
        {period:'2025 H2',nominated:112,responded:98, detractor:1,passive:17,promoter:80, rr:87.50,nps:80.61},
      ],
    },
    whs_cpt_na:{
      label:'CPT-NA',
      rows:[
        {period:'2024 H1',nominated:99,responded:7, detractor:0,passive:1,promoter:6, rr:7.07, nps:85.71},
        {period:'2024 H2',nominated:88,responded:62,detractor:1,passive:8,promoter:53,rr:70.45,nps:83.87},
        {period:'2025 H1',nominated:67,responded:64,detractor:1,passive:8,promoter:55,rr:95.52,nps:84.38},
        {period:'2025 H2',nominated:43,responded:42,detractor:0,passive:8,promoter:34,rr:97.67,nps:80.95},
      ],
    },
    fec:{
      label:'FEC',
      rows:[
        {period:'2024 H1',nominated:227,responded:80,detractor:4,passive:19,promoter:57,rr:35.24,nps:66.25},
        {period:'2024 H2',nominated:165,responded:86,detractor:9,passive:24,promoter:53,rr:52.12,nps:51.16},
        {period:'2025 H1',nominated:79, responded:64,detractor:4,passive:21,promoter:39,rr:81.01,nps:54.69},
        {period:'2025 H2',nominated:51, responded:32,detractor:1,passive:10,promoter:21,rr:62.75,nps:62.50},
      ],
    },
  };

  function buildHistoricalTable(orgId,filterPeriod){
    const data=HISTORICAL_DATA[orgId];
    if(!data)return'';
    let rows=data.rows.slice();
    if(filterPeriod)rows=rows.filter(r=>r.period===filterPeriod);

    if(!rows.length){
      return `<div class="card mt-4"><div class="card-header bg-light"><strong>NPS Historical Data — ${data.label}</strong></div>
        <div class="card-body text-muted">No data for selected period.</div></div>`;
    }

    const range=`${rows[0].period} - ${rows[rows.length-1].period}`;
    let h=`<div class="card mt-4"><div class="card-header bg-light">
      <strong>NPS Historical Data — ${data.label}</strong>
      <span class="text-muted ms-2">(${range})</span></div>
      <div class="card-body p-0"><table class="table table-sm mb-0">
      <thead class="table-light"><tr>
      <th>Period</th><th class="text-center">Total Nominated</th><th class="text-center">Total response receive</th>
      <th class="text-center text-danger">Detractor</th><th class="text-center text-warning">Passive</th>
      <th class="text-center text-success">Promoter</th><th class="text-center">RR%</th>
      <th class="text-center">NPS</th></tr></thead><tbody>`;
    for(const r of rows){
      h+=`<tr><td><strong>${r.period}</strong></td>
        <td class="text-center">${r.nominated}</td><td class="text-center">${r.responded}</td>
        <td class="text-center text-danger">${r.detractor}</td>
        <td class="text-center text-warning">${r.passive}</td>
        <td class="text-center text-success">${r.promoter}</td>
        <td class="text-center">${r.rr.toFixed(2)}%</td>
        <td class="text-center"><strong class="${nc(r.nps)}">${r.nps.toFixed(2)}</strong></td></tr>`;
    }
    return h+'</tbody></table></div></div>';
  }

  // ----- Stat row -----
  // Order: NPS Score, Response Rate, Promoters, Passives, Detractors, Responded, Nominated.
  // Pending tile removed (Sprint 2 change).
  function setStat(stats){
    const rate=stats.nom?(stats.resp/stats.nom*100).toFixed(0)+'%':'0%';
    const items=[
      {label:'NPS Score',value:(stats.nps||0).toFixed(1),cls:nc(stats.nps||0)},
      {label:'Response Rate',value:rate,cls:''},
      {label:'Promoters',value:stats.p||0,cls:'text-success'},
      {label:'Passives',value:stats.pa||0,cls:'text-warning'},
      {label:'Detractors',value:stats.d||0,cls:'text-danger'},
      {label:'Responded',value:stats.resp||0,cls:''},
      {label:'Nominated',value:stats.nom||0,cls:''},
    ];
    statRow.innerHTML=items.map(i=>`<div class="stat-box"><div class="label">${i.label}</div><div class="value ${i.cls}">${i.value}</div></div>`).join('');
  }

  // ----- Leader table (per-org) -----
  // Columns: Leader, Nominated, Responded, Rate, Promoters, Passives, Detractors, NPS.
  // "Pending" column removed (Sprint 2 change). Per-leader Remind link is
  // appended to the Leader cell for any leader who has pending stakeholders.
  function buildLeaderTable(leaders,orgId,cycleId){
    if(!leaders||!leaders.length)return'<p class="text-muted">No leader data available.</p>';
    let h=`<table class="table table-sm table-hover bg-white rounded"><thead class="table-light"><tr>
      <th>Leader</th><th class="text-center">Nominated</th><th class="text-center">Responded</th>
      <th class="text-center">Rate</th>
      <th class="text-center text-success">Promoters</th><th class="text-center text-warning">Passives</th>
      <th class="text-center text-danger">Detractors</th><th class="text-center">NPS</th></tr></thead><tbody>`;
    for(const l of leaders){
      const pending=Math.max(0,(l.nominated||0)-(l.responded||0));
      const remindLink=(pending>0&&orgId&&cycleId)
        ? ` <a href="#" class="btn-remind-leader text-decoration-none small" data-org="${orgId}" data-cycle="${cycleId}" data-leader="${l.leader.replace(/"/g,'&quot;')}" data-pending="${pending}" title="Send reminder to ${pending} pending under ${l.leader}">✉️ Remind (${pending})</a>`
        : '';
      h+=`<tr><td><strong>${l.leader}</strong>${remindLink}</td>
        <td class="text-center">${l.nominated}</td><td class="text-center">${l.responded}</td>
        <td class="text-center">${(l.response_rate*100).toFixed(0)}%</td>
        <td class="text-center">${l.promoter_count} <small class="text-muted">(${pct(l.promoter_count,l.responded)}%)</small></td>
        <td class="text-center">${l.passive_count} <small class="text-muted">(${pct(l.passive_count,l.responded)}%)</small></td>
        <td class="text-center">${l.detractor_count} <small class="text-muted">(${pct(l.detractor_count,l.responded)}%)</small></td>
        <td class="text-center"><strong class="${nc(l.nps_score)}">${l.nps_score.toFixed(1)}</strong></td></tr>`;
    }
    return h+'</tbody></table>';
  }

  // ----- Summary pane (All Orgs) -----
  // Org Comparison columns: Organization, Cycle, NPS, Rate, Nominated, Responded, P, Pa, D.
  // Sprint 2: Rate moved next to NPS, Pending column removed.
  function buildSummaryPane(d){
    let h='<div class="tab-pane fade show active" id="pane-all" role="tabpanel">';
    if(d.org_summaries&&d.org_summaries.length){
      h+=`<h6 class="mb-2">Organization Comparison</h6>
        <table class="table table-sm table-hover bg-white rounded"><thead class="table-light"><tr>
        <th>Organization</th><th>Cycle</th>
        <th class="text-center">NPS</th><th class="text-center">Rate</th>
        <th class="text-center">Nominated</th><th class="text-center">Responded</th>
        <th class="text-center text-success">P</th><th class="text-center text-warning">Pa</th>
        <th class="text-center text-danger">D</th></tr></thead><tbody>`;
      for(const o of d.org_summaries){
        h+=`<tr><td><strong>${o.org_name}</strong></td><td>${o.cycle_name}</td>
          <td class="text-center"><strong class="${nc(o.nps_score)}">${o.nps_score}</strong></td>
          <td class="text-center">${(o.response_rate*100).toFixed(0)}%</td>
          <td class="text-center">${o.total_nominated}</td><td class="text-center">${o.total_responded}</td>
          <td class="text-center">${o.promoter_count}</td><td class="text-center">${o.passive_count}</td>
          <td class="text-center">${o.detractor_count}</td></tr>`;
      }
      h+='</tbody></table>';
    }
    return h+'</div>';
  }

  function buildOrgPane(orgId,summaries,leaders,pendingCount){
    const latest=summaries.length?summaries[summaries.length-1]:null;
    let h=`<div class="tab-pane fade" id="pane-${orgId}" role="tabpanel">`;
    if(!latest)return h+'<p class="text-muted">No survey cycles found.</p></div>';

    // Header row: cycle label on the left, action buttons on the right.
    // pendingCount is the authoritative number from /nps/pending (matches the
    // modal). Falls back to leader-sum if the fetch failed.
    if(pendingCount===undefined||pendingCount===null){
      pendingCount=leaders.reduce((acc,l)=>acc+Math.max(0,l.nominated-l.responded),0);
    }
    const reminderDisabled=pendingCount<=0?'disabled':'';
    h+=`<div class="d-flex justify-content-between align-items-center mb-3">
      <h6 class="text-muted m-0">Current Cycle: ${cn(latest)}</h6>
      <div>
        <button class="btn btn-sm btn-outline-secondary me-2" id="btnViewPending-${orgId}"
          data-org="${orgId}" data-cycle="${latest.cycle_id}">
          View Pending (${pendingCount})
        </button>
        <button class="btn btn-sm btn-outline-primary" id="btnRemind-${orgId}"
          data-org="${orgId}" data-cycle="${latest.cycle_id}" data-pending="${pendingCount}" ${reminderDisabled}>
          Send Reminder to Pending (${pendingCount})
        </button>
      </div>
    </div>`;

    // Per-org leader table is rendered into a dedicated container so filters can re-render it
    h+=`<div id="leaderTable-${orgId}">${buildLeaderTable(leaders,orgId,latest.cycle_id)}</div>`;
    if(summaries.length>1){
      h+=`<h6 class="mt-3 mb-2">Trend</h6><table class="table table-sm table-striped bg-white rounded"><thead><tr>
        <th>Cycle</th><th>NPS</th><th>P</th><th>Pa</th><th>D</th><th>Resp</th><th>Nom</th><th>Rate</th></tr></thead><tbody>`;
      for(const s of summaries)h+=`<tr><td>${cn(s)}</td><td><strong class="${nc(s.nps_score)}">${s.nps_score.toFixed(1)}</strong></td>
        <td>${s.promoter_count}</td><td>${s.passive_count}</td><td>${s.detractor_count}</td>
        <td>${s.total_responded}</td><td>${s.total_nominated}</td><td>${(s.response_rate*100).toFixed(1)}%</td></tr>`;
      h+='</tbody></table>';
    }
    // Historical data table (hardcoded for now, filterable via the Cycle dropdown's period values)
    h+=`<div id="historicalTable-${orgId}">${buildHistoricalTable(orgId,'')}</div>`;
    return h+'</div>';
  }

  function addTab(id,label,active){
    const li=document.createElement('li');li.className='nav-item';
    li.innerHTML=`<button class="nav-link ${active?'active':''}" data-bs-toggle="tab" data-bs-target="#${id}" type="button" role="tab">${label}</button>`;
    tabsEl.appendChild(li);
  }

  // ----- Filters -----
  // Live-apply: any change to a filter dropdown re-renders the active pane.
  // Leader dropdown is repopulated on tab switch — only leaders for the
  // active org are shown (or all leaders on the "All Orgs" tab).
  function refreshLeaderDropdown(){
    const previousValue=fLeader.value;
    fLeader.innerHTML='<option value="">All Leaders</option>';
    let leaders=[];
    if(DATA.activeOrg==='all'){
      // Union of leaders across all orgs
      const seen=new Set();
      for(const oid of Object.keys(DATA.orgMap)){
        for(const l of (DATA.orgMap[oid].leaders||[])){
          if(!seen.has(l.leader)){seen.add(l.leader);leaders.push(l.leader);}
        }
      }
    } else {
      const od=DATA.orgMap[DATA.activeOrg];
      if(od)leaders=(od.leaders||[]).map(l=>l.leader);
    }
    leaders.sort();
    for(const name of leaders){
      fLeader.add(new Option(name,name));
    }
    // Restore previous selection if still valid; otherwise reset
    if(previousValue&&leaders.includes(previousValue)){
      fLeader.value=previousValue;
    } else {
      fLeader.value='';
    }
  }

  function applyFilters(){
    if(!DATA.activeOrg||DATA.activeOrg==='all')return; // filters only meaningful in per-org view
    const od=DATA.orgMap[DATA.activeOrg];if(!od)return;
    const cycleVal=fCycle.value;
    const leaderVal=fLeader.value;

    // Pick the cycle's leaders (default = latest live cycle)
    let leaders=od.leaders;
    if(cycleVal&&od.leadersByCycle&&od.leadersByCycle[cycleVal]){
      leaders=od.leadersByCycle[cycleVal];
    } else if(cycleVal && !od.leadersByCycle[cycleVal]){
      // Selected period is historical (not in DynamoDB) — clear leader table since
      // we don't have per-leader granularity for older cycles.
      leaders=[];
    }

    // Filter by leader name (just one row)
    if(leaderVal){
      leaders=leaders.filter(l=>l.leader===leaderVal);
    }

    // Re-render leader table
    const od2=DATA.orgMap[DATA.activeOrg];
    const activeCycleId=cycleVal||(od2&&od2.sums.length?od2.sums[od2.sums.length-1].cycle_id:'');
    const tableHtml=buildLeaderTable(leaders,DATA.activeOrg,activeCycleId);
    const container=document.getElementById('leaderTable-'+DATA.activeOrg);
    if(container)container.innerHTML=tableHtml;

    // Re-render historical table — filter by selected period if it's a historical one
    const histContainer=document.getElementById('historicalTable-'+DATA.activeOrg);
    if(histContainer){
      // If cycleVal looks like a historical period (e.g. "2024 H1"), filter to just that row;
      // otherwise show all historical rows.
      const historicalFilter=isHistoricalPeriod(cycleVal)?cycleVal:'';
      histContainer.innerHTML=buildHistoricalTable(DATA.activeOrg,historicalFilter);
    }

    // Recompute stat row from filtered leaders if any selection is active.
    if(leaders.length){
      const totals=leaders.reduce((acc,l)=>{
        acc.nom+=l.nominated;acc.resp+=l.responded;acc.p+=l.promoter_count;
        acc.pa+=l.passive_count;acc.d+=l.detractor_count;return acc;
      },{nom:0,resp:0,p:0,pa:0,d:0});
      const totalResp=totals.resp||1;
      let nps=0;
      for(const l of leaders){nps+=(l.nps_score*l.responded);}
      nps=totalResp?(nps/totalResp):0;
      setStat({...totals,nps});
    } else if(cycleVal && isHistoricalPeriod(cycleVal)){
      // For historical periods, show that period's totals in the stat row
      const data=HISTORICAL_DATA[DATA.activeOrg];
      const row=data&&data.rows.find(r=>r.period===cycleVal);
      if(row){
        setStat({nps:row.nps,p:row.promoter,pa:row.passive,d:row.detractor,
                 resp:row.responded,nom:row.nominated});
      }
    }
  }

  function isHistoricalPeriod(value){
    // Historical period labels look like "2024 H1", "2025 H2", etc.
    return /^\d{4}\s*H[12]$/i.test(value||'');
  }

  // ----- Reminder handlers (bulk / per-leader / per-stakeholder) -----

  function _summarizeReminderResult(data){
    const failed=data.failed_count||0;
    return (
      `Reminder dispatched.\n` +
      `Email sent: ${data.email_sent_count||0}\n` +
      `Slack sent: ${data.slack_sent_count||0}\n` +
      `Failed: ${failed}` +
      (failed>0?'\n\nCheck delivery failure log for details.':'')
    );
  }

  async function handleBulkRemind(btn){
    const orgId=btn.dataset.org;
    const cycleId=btn.dataset.cycle;
    const pending=parseInt(btn.dataset.pending||'0',10);
    if(pending<=0){
      alert('No pending stakeholders for this cycle.');
      return;
    }
    if(!window.confirm(
      `Send reminder to ${pending} pending stakeholder${pending===1?'':'s'} in ${orgId}?\n\n` +
      `This will dispatch real emails (and Slack DMs if configured). Continue?`
    ))return;
    const original=btn.textContent;
    btn.disabled=true;btn.textContent='Sending...';
    try{
      const resp=await fetch('/nps/remind',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({org_id:orgId,cycle_id:cycleId}),
      });
      const data=await resp.json();
      alert(resp.ok?_summarizeReminderResult(data):('Reminder failed: '+(data.error||resp.status)));
    }catch(err){alert('Reminder failed: '+err.message);}
    finally{btn.disabled=false;btn.textContent=original;}
  }

  async function handlePerLeaderRemind(link){
    const orgId=link.dataset.org;
    const cycleId=link.dataset.cycle;
    const leader=link.dataset.leader;
    // Resolve the actual emails for this leader from /nps/pending?leader=...
    // Don't trust the leader-table 'pending' count — it can drift when a
    // respondent picks a different leader on the form than their nomination's
    // leader. The /nps/pending endpoint is the source of truth.
    let recipients=[];
    try{
      const listResp=await fetch(`/nps/pending?org_id=${encodeURIComponent(orgId)}&cycle_id=${encodeURIComponent(cycleId)}&leader=${encodeURIComponent(leader)}`);
      if(!listResp.ok){alert('Could not load pending list: '+listResp.status);return;}
      recipients=await listResp.json();
    }catch(err){alert('Could not load pending list: '+err.message);return;}

    if(!recipients.length){
      alert('No pending stakeholders under '+leader+'.');
      return;
    }
    const emails=recipients.map(x=>x.email).filter(Boolean);
    const actualCount=emails.length;
    if(!window.confirm(
      `Send reminder to ${actualCount} pending stakeholder${actualCount===1?'':'s'} under ${leader} in ${orgId}?\n\n` +
      `This will dispatch real emails (and Slack DMs if configured). Continue?`
    ))return;

    const original=link.textContent;
    link.textContent='Sending...';
    try{
      const resp=await fetch('/nps/remind/targeted',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({org_id:orgId,cycle_id:cycleId,emails:emails}),
      });
      const data=await resp.json();
      alert(resp.ok?_summarizeReminderResult(data):('Reminder failed: '+(data.error||resp.status)));
    }catch(err){alert('Reminder failed: '+err.message);}
    finally{link.textContent=original;}
  }

  async function openPendingModal(orgId,cycleId){
    const body=document.getElementById('pendingModalBody');
    body.innerHTML='<div class="text-center"><div class="spinner-border text-success"></div></div>';
    // Show the modal up front; we'll fill it in once the fetch returns.
    const modal=new bootstrap.Modal(document.getElementById('pendingModal'));
    modal.show();
    try{
      const resp=await fetch(`/nps/pending?org_id=${encodeURIComponent(orgId)}&cycle_id=${encodeURIComponent(cycleId)}`);
      if(!resp.ok){body.innerHTML='<div class="alert alert-danger">Failed to load: '+resp.status+'</div>';return;}
      const list=await resp.json();
      if(!list.length){body.innerHTML='<p class="text-muted m-0">No pending stakeholders. 🎉</p>';return;}
      let h=`<p class="text-muted">${list.length} pending stakeholder${list.length===1?'':'s'} for this cycle. Click <em>Send</em> to remind them individually.</p>
        <table class="table table-sm table-hover">
        <thead class="table-light"><tr>
        <th>Name</th><th>Email</th><th>Leader</th><th class="text-end"></th></tr></thead><tbody>`;
      for(const n of list){
        const email=String(n.email||'').replace(/"/g,'&quot;');
        const safeName=(n.name||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
        const safeLeader=(n.leader||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
        h+=`<tr>
          <td>${safeName||'<em class="text-muted">unnamed</em>'}</td>
          <td><code>${email}</code></td>
          <td>${safeLeader||'<em class="text-muted">unassigned</em>'}</td>
          <td class="text-end">
            <button class="btn btn-sm btn-outline-primary btn-remind-individual"
              data-org="${orgId}" data-cycle="${cycleId}" data-email="${email}" data-name="${safeName}">
              Send
            </button>
          </td>
        </tr>`;
      }
      h+='</tbody></table>';
      body.innerHTML=h;
    }catch(err){
      body.innerHTML='<div class="alert alert-danger">Error: '+err.message+'</div>';
    }
  }

  async function handleIndividualRemind(btn){
    const orgId=btn.dataset.org;
    const cycleId=btn.dataset.cycle;
    const email=btn.dataset.email;
    const name=btn.dataset.name||email;
    if(!window.confirm(
      `Send a reminder to ${name} (${email}) in ${orgId}?\n\n` +
      `This will dispatch a real email (and Slack DM if configured). Continue?`
    ))return;
    const original=btn.textContent;
    btn.disabled=true;btn.textContent='Sending...';
    try{
      const resp=await fetch('/nps/remind/targeted',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({org_id:orgId,cycle_id:cycleId,emails:[email]}),
      });
      const data=await resp.json();
      if(resp.ok){
        btn.textContent='Sent ✓';
        btn.classList.remove('btn-outline-primary');
        btn.classList.add('btn-success');
      } else {
        alert('Reminder failed: '+(data.error||resp.status));
        btn.disabled=false;btn.textContent=original;
      }
    }catch(err){
      alert('Reminder failed: '+err.message);
      btn.disabled=false;btn.textContent=original;
    }
  }

  async function load(){
    try{
      const orgs=await F('/nps/orgs');
      DATA.orgs=orgs.filter(o=>o.is_active);
      loading.classList.add('d-none');
      main.classList.remove('d-none');
      if(!DATA.orgs.length)return;

      // Summary
      DATA.summary=await F('/nps/dashboard/summary');
      setStat({nps:DATA.summary.overall_nps,p:DATA.summary.total_promoters,pa:DATA.summary.total_passives,
        d:DATA.summary.total_detractors,resp:DATA.summary.total_responded,nom:DATA.summary.total_nominated});

      // All Orgs tab
      addTab('pane-all','All Orgs',true);
      contentEl.insertAdjacentHTML('beforeend',buildSummaryPane(DATA.summary));
      DATA.activeOrg='all';

      const seenCycles=new Set();
      // Per-org tabs
      for(const org of DATA.orgs){
        addTab('pane-'+org.org_id,org.org_name,false);
        let sums=[];try{sums=await F('/nps/dashboard?org_id='+encodeURIComponent(org.org_id));if(!Array.isArray(sums))sums=[sums];}catch(e){}
        let leaders=[];
        const leadersByCycle={};
        if(sums.length){
          for(const s of sums){
            try{
              const ls=await F('/nps/dashboard/leaders?org_id='+encodeURIComponent(org.org_id)+'&cycle_id='+encodeURIComponent(s.cycle_id));
              leadersByCycle[s.cycle_id]=ls;
              if(s===sums[sums.length-1])leaders=ls;
            }catch(e){}
          }
        }
        // Fetch the *real* pending list (responded=False) so the header button
        // shows a count consistent with the modal. The leader breakdown's
        // pending sum can drift when respondents pick a different leader on
        // the Asana form than the workbook says owns them.
        let pendingCount=0;
        if(sums.length){
          try{
            const pendingResp=await fetch(`/nps/pending?org_id=${encodeURIComponent(org.org_id)}&cycle_id=${encodeURIComponent(sums[sums.length-1].cycle_id)}`);
            if(pendingResp.ok){
              const list=await pendingResp.json();
              pendingCount=list.length;
            }
          }catch(_){}
        }
        DATA.orgMap[org.org_id]={sums,leaders,leadersByCycle,org,pendingCount};
        contentEl.insertAdjacentHTML('beforeend',buildOrgPane(org.org_id,sums,leaders,pendingCount));

        // Populate Cycle filter (cycles are global across orgs)
        for(const s of sums){
          const lbl=cn(s);
          if(!seenCycles.has(s.cycle_id)){
            seenCycles.add(s.cycle_id);
            fCycle.add(new Option(lbl,s.cycle_id));
          }
        }
      }

      // Add historical periods to the Cycle dropdown so users can drill into prior cycles.
      // Historical data is hardcoded (in HISTORICAL_DATA) until a workbook source is wired up.
      const historicalPeriods=new Set();
      for(const oid of Object.keys(HISTORICAL_DATA)){
        for(const r of HISTORICAL_DATA[oid].rows){historicalPeriods.add(r.period);}
      }
      // Sort historical periods chronologically: "2024 H1" < "2024 H2" < "2025 H1" ...
      const sortedHist=Array.from(historicalPeriods).sort();
      for(const p of sortedHist){
        if(!seenCycles.has(p)){
          seenCycles.add(p);
          fCycle.add(new Option(p,p));
        }
      }

      // Initial Leader dropdown — show union (we're on All Orgs tab to start)
      refreshLeaderDropdown();

      // Tab click updates stat bar AND active-org tracking
      tabsEl.addEventListener('click',function(e){
        const btn=e.target.closest('.nav-link');if(!btn)return;
        const target=btn.getAttribute('data-bs-target');
        if(target==='#pane-all'){
          DATA.activeOrg='all';
          setStat({nps:DATA.summary.overall_nps,p:DATA.summary.total_promoters,pa:DATA.summary.total_passives,
            d:DATA.summary.total_detractors,resp:DATA.summary.total_responded,nom:DATA.summary.total_nominated});
          refreshLeaderDropdown();
        } else {
          const oid=target.replace('#pane-','');
          DATA.activeOrg=oid;
          const od=DATA.orgMap[oid];
          if(od&&od.sums.length){
            const s=od.sums[od.sums.length-1];
            setStat({nps:s.nps_score,p:s.promoter_count,pa:s.passive_count,d:s.detractor_count,resp:s.total_responded,nom:s.total_nominated});
            refreshLeaderDropdown();
            // Refresh per-org leader table on tab switch (in case a filter was set)
            applyFilters();
          }
        }
      });

      // Live filters — re-render leader table + stat row on any change
      fCycle.addEventListener('change',applyFilters);
      fLeader.addEventListener('change',applyFilters);
      fCategory.addEventListener('change',applyFilters);

      // Reminder + pending-list buttons — delegated handler covers all org panes
      contentEl.addEventListener('click',async function(e){
        // Bulk remind ("Send Reminder to Pending (N)")
        const bulk=e.target.closest('[id^="btnRemind-"]');
        if(bulk){
          await handleBulkRemind(bulk);
          return;
        }
        // Per-leader remind link in the leader table
        const perLeader=e.target.closest('.btn-remind-leader');
        if(perLeader){
          e.preventDefault();
          await handlePerLeaderRemind(perLeader);
          return;
        }
        // "View Pending" — open modal with individual stakeholder rows
        const viewPending=e.target.closest('[id^="btnViewPending-"]');
        if(viewPending){
          await openPendingModal(viewPending.dataset.org, viewPending.dataset.cycle);
          return;
        }
      });

      // Modal-internal individual-send buttons (delegated)
      const pendingModalBody=document.getElementById('pendingModalBody');
      pendingModalBody.addEventListener('click',async function(e){
        const btn=e.target.closest('.btn-remind-individual');
        if(!btn)return;
        e.preventDefault();
        await handleIndividualRemind(btn);
      });

      // Clear button
      document.getElementById('btnClear').addEventListener('click',function(){
        fCycle.value='';fLeader.value='';fCategory.value='';
        applyFilters();
      });

    }catch(e){loading.classList.add('d-none');main.classList.remove('d-none');
      main.innerHTML='<div class="alert alert-danger">Error: '+e.message+'</div>';}
  }

  async function checkAsanaAuth(){
    try{
      const r=await fetch('/nps/auth/status');
      if(!r.ok)return;
      const d=await r.json();
      // Hide the banner whenever any auth mode (pat or oauth) is active.
      if(!d.authorized){document.getElementById('asanaBanner').classList.remove('d-none');}
    }catch(_){}
  }

  checkAsanaAuth();
  load();
})();
</script>
{% endblock %}

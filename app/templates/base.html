<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}NPS Survey Tool{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --whs-green: #1a472a; --whs-green-light: #2d6a3f; --whs-accent: #4CAF50; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f5f6fa; }
    .whs-header { background: var(--whs-green); color: white; padding: 8px 0; }
    .whs-header .navbar-brand { font-weight: 700; font-size: 1.1rem; }
    .whs-header .nav-link { color: rgba(255,255,255,0.85) !important; font-size: 0.9rem; }
    .whs-header .nav-link:hover { color: white !important; }
    .whs-header .nav-link.active { color: white !important; border-bottom: 2px solid var(--whs-accent); }
    .whs-title-bar { background: var(--whs-green-light); color: white; padding: 12px 0; text-align: center; }
    .whs-title-bar h2 { margin: 0; font-size: 1.5rem; font-weight: 600; }
    .filter-bar { background: #e8ecef; padding: 10px 0; border-bottom: 1px solid #ccc; }
    .filter-bar select { font-size: 0.85rem; }
    .stat-card { text-align: center; border: none; border-radius: 8px; }
    .stat-card .stat-value { font-size: 2.2rem; font-weight: 700; }
    .stat-card .stat-label { font-size: 0.8rem; color: #666; text-transform: uppercase; }
    .nav-tabs .nav-link { font-size: 0.9rem; }
    .table th { font-size: 0.8rem; text-transform: uppercase; color: #555; }
    .badge-promoter { background: #4CAF50; }
    .badge-passive { background: #FF9800; }
    .badge-detractor { background: #f44336; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <!-- WHS Header -->
  <nav class="whs-header">
    <div class="container-fluid px-4">
      <div class="d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center">
          <span class="navbar-brand mb-0 me-2" style="font-size:1.3rem;">
            <strong>WHS</strong> <small style="font-size:0.7rem;opacity:0.8;">Workplace<br>Health & Safety</small>
          </span>
          <div class="navbar-nav flex-row ms-4">
            <a class="nav-link px-3" href="/nps/dashboard">Dashboard</a>
            <a class="nav-link px-3" href="/nps/orgs/view">Orgs</a>
            <a class="nav-link px-3" href="/nps/nominations/view">Nominations</a>
            <a class="nav-link px-3" href="/nps/cycles/view">Cycles</a>
            <a class="nav-link px-3" href="/nps/responses/view">Responses</a>
          </div>
        </div>
        <div class="navbar-nav flex-row">
          <span class="nav-link px-2" id="navUser" style="font-size:0.85rem;"></span>
          <a class="nav-link px-2" href="/nps/auth/logout" style="font-size:0.85rem;">Logout</a>
        </div>
      </div>
    </div>
  </nav>

  {% block titlebar %}{% endblock %}

  <div class="container-fluid px-4 mt-3">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" font-family="Segoe UI, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#15803d"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="550" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">NPS Survey Automation — Data Flow</text>
  <text x="550" y="48" text-anchor="middle" font-size="12" fill="#475569">WHS CPT IN • Data Classification: Confidential • All transport TLS 1.2+</text>

  <!-- Amazon Corp box -->
  <rect x="30" y="80" width="320" height="110" rx="10" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="190" y="105" text-anchor="middle" font-weight="700" fill="#1e3a8a">Amazon Corp Network</text>
  <rect x="60" y="125" width="260" height="50" rx="6" fill="#ffffff" stroke="#1d4ed8"/>
  <text x="190" y="148" text-anchor="middle" font-weight="600" fill="#0f172a">Internal user (browser)</text>
  <text x="190" y="165" text-anchor="middle" font-size="11" fill="#475569">WHS CPT IN admin / leadership viewer</text>

  <!-- Arrow: user -> nginx -->
  <line x1="350" y1="150" x2="460" y2="150" stroke="#15803d" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="405" y="140" text-anchor="middle" font-size="11" fill="#15803d" font-weight="600">HTTPS</text>
  <text x="405" y="168" text-anchor="middle" font-size="10" fill="#15803d">Let's Encrypt</text>

  <!-- AWS Account box -->
  <rect x="460" y="80" width="600" height="430" rx="10" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
  <text x="760" y="105" text-anchor="middle" font-weight="700" fill="#7c2d12">AWS Account 399016860083 (ap-south-1)</text>

  <!-- EC2 box -->
  <rect x="480" y="125" width="560" height="140" rx="8" fill="#ffffff" stroke="#b45309"/>
  <text x="760" y="145" text-anchor="middle" font-weight="600" fill="#0f172a">EC2 i-06ccd83e4b55fa98f (nps-survey-app, t3.micro)</text>

  <rect x="500" y="160" width="240" height="90" rx="6" fill="#fefce8" stroke="#854d0e"/>
  <text x="620" y="180" text-anchor="middle" font-weight="600" fill="#0f172a">nginx :443</text>
  <text x="620" y="198" text-anchor="middle" font-size="11" fill="#475569">TLS termination</text>
  <text x="620" y="215" text-anchor="middle" font-size="11" fill="#475569">Security Group: ports 443/80 only</text>
  <text x="620" y="232" text-anchor="middle" font-size="11" fill="#b91c1c">Port 5000 closed to internet</text>

  <rect x="770" y="160" width="250" height="90" rx="6" fill="#fefce8" stroke="#854d0e"/>
  <text x="895" y="180" text-anchor="middle" font-weight="600" fill="#0f172a">Flask / gunicorn :5000</text>
  <text x="895" y="198" text-anchor="middle" font-size="11" fill="#475569">Localhost bind (127.0.0.1)</text>
  <text x="895" y="215" text-anchor="middle" font-size="11" fill="#475569">IAM role: nps-survey-ec2-role</text>
  <text x="895" y="232" text-anchor="middle" font-size="11" fill="#475569">Role-based access (admin/editor/viewer)</text>

  <!-- arrow nginx -> flask -->
  <line x1="740" y1="205" x2="770" y2="205" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="755" y="198" text-anchor="middle" font-size="10" fill="#475569">localhost</text>

  <!-- Downstream AWS services row -->
  <rect x="480" y="290" width="180" height="60" rx="6" fill="#ffffff" stroke="#b45309"/>
  <text x="570" y="312" text-anchor="middle" font-weight="600" fill="#0f172a">AWS Secrets Manager</text>
  <text x="570" y="330" text-anchor="middle" font-size="10" fill="#475569">Asana OAuth token</text>
  <text x="570" y="343" text-anchor="middle" font-size="10" fill="#475569">KMS-encrypted</text>

  <rect x="670" y="290" width="180" height="60" rx="6" fill="#ffffff" stroke="#b45309"/>
  <text x="760" y="312" text-anchor="middle" font-weight="600" fill="#0f172a">DynamoDB</text>
  <text x="760" y="330" text-anchor="middle" font-size="10" fill="#475569">NpsOrgConfig: users, config</text>
  <text x="760" y="343" text-anchor="middle" font-size="10" fill="#475569">KMS-encrypted</text>

  <rect x="860" y="290" width="180" height="60" rx="6" fill="#ffffff" stroke="#b45309"/>
  <text x="950" y="312" text-anchor="middle" font-weight="600" fill="#0f172a">SES</text>
  <text x="950" y="330" text-anchor="middle" font-size="10" fill="#475569">Outbound reminder</text>
  <text x="950" y="343" text-anchor="middle" font-size="10" fill="#475569">emails to @amazon.com</text>

  <!-- Slack -->
  <rect x="670" y="370" width="180" height="55" rx="6" fill="#ffffff" stroke="#b45309"/>
  <text x="760" y="390" text-anchor="middle" font-weight="600" fill="#0f172a">Slack API</text>
  <text x="760" y="407" text-anchor="middle" font-size="10" fill="#475569">Outbound DM reminders</text>
  <text x="760" y="420" text-anchor="middle" font-size="10" fill="#475569">(optional)</text>

  <!-- CloudWatch -->
  <rect x="860" y="370" width="180" height="55" rx="6" fill="#ffffff" stroke="#b45309"/>
  <text x="950" y="390" text-anchor="middle" font-weight="600" fill="#0f172a">CloudWatch Logs</text>
  <text x="950" y="407" text-anchor="middle" font-size="10" fill="#475569">Audit + app logs</text>
  <text x="950" y="420" text-anchor="middle" font-size="10" fill="#475569">(no tokens logged)</text>

  <!-- Arrows from Flask to services -->
  <line x1="850" y1="255" x2="570" y2="285" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="895" y1="255" x2="760" y2="285" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="940" y1="255" x2="950" y2="285" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="895" y1="255" x2="760" y2="365" stroke="#334155" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <line x1="940" y1="255" x2="950" y2="365" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Legend within AWS box -->
  <text x="480" y="470" font-size="11" fill="#7c2d12" font-weight="600">Flask → all internal services over AWS network (IAM-scoped, KMS at rest)</text>
  <text x="480" y="488" font-size="11" fill="#7c2d12">Tokens never logged • CloudTrail audits Secrets Manager access</text>

  <!-- Asana box -->
  <rect x="30" y="550" width="1030" height="170" rx="10" fill="#fef2f2" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="545" y="575" text-anchor="middle" font-weight="700" fill="#7f1d1d">Asana SaaS (external) — approved for Confidential data</text>

  <rect x="60" y="595" width="380" height="105" rx="6" fill="#ffffff" stroke="#b91c1c"/>
  <text x="250" y="618" text-anchor="middle" font-weight="600" fill="#0f172a">app.asana.com — REST API</text>
  <text x="250" y="638" text-anchor="middle" font-size="11" fill="#475569">• Stores survey tasks + form responses</text>
  <text x="250" y="655" text-anchor="middle" font-size="11" fill="#475569">• Custom fields: NPS score, category, org name</text>
  <text x="250" y="672" text-anchor="middle" font-size="11" fill="#475569">• Data: internal Amazon employee names,</text>
  <text x="250" y="688" text-anchor="middle" font-size="11" fill="#475569">  @amazon.com emails, NPS (1–10), optional comments</text>

  <rect x="460" y="595" width="340" height="105" rx="6" fill="#ffffff" stroke="#b91c1c"/>
  <text x="630" y="618" text-anchor="middle" font-weight="600" fill="#0f172a">Asana Webhooks</text>
  <text x="630" y="638" text-anchor="middle" font-size="11" fill="#475569">• Posts to /webhook/asana on new responses</text>
  <text x="630" y="655" text-anchor="middle" font-size="11" fill="#475569">• X-Hook-Secret handshake on registration</text>
  <text x="630" y="672" text-anchor="middle" font-size="11" fill="#475569">• HTTPS inbound only; validated by app</text>

  <rect x="820" y="595" width="220" height="105" rx="6" fill="#ffffff" stroke="#b91c1c"/>
  <text x="930" y="618" text-anchor="middle" font-weight="600" fill="#0f172a">OAuth 2.0 (Auth Code)</text>
  <text x="930" y="638" text-anchor="middle" font-size="11" fill="#475569">• client_id / client_secret</text>
  <text x="930" y="655" text-anchor="middle" font-size="11" fill="#475569">• Refresh token (non-expiring)</text>
  <text x="930" y="672" text-anchor="middle" font-size="11" fill="#475569">• Access token rotated hourly</text>

  <!-- Arrows Flask <-> Asana -->
  <line x1="895" y1="255" x2="250" y2="590" stroke="#15803d" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="535" y="390" font-size="12" font-weight="600" fill="#15803d">HTTPS (Bearer token)</text>
  <text x="535" y="407" font-size="11" fill="#15803d">GET/POST/PUT /tasks, /projects, /webhooks</text>

  <line x1="630" y1="590" x2="620" y2="255" stroke="#b91c1c" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="250" y="530" font-size="12" font-weight="600" fill="#b91c1c">HTTPS webhook POST</text>
  <text x="250" y="547" font-size="11" fill="#b91c1c">Inbound on nginx :443 → Flask /webhook/asana</text>

  <!-- Footer -->
  <text x="550" y="744" text-anchor="middle" font-size="11" fill="#475569">
    Amazon ↔ Asana only. No data exported to Tableau, QuickSight, external BI, or vendor software. Directionality: bidirectional (read + write + webhook-receive).
  </text>
</svg>

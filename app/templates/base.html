<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}NPS Survey Tool{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="/nps/dashboard">NPS Survey Tool</a>
      <div class="navbar-nav me-auto">
        <a class="nav-link" href="/nps/dashboard">Dashboard</a>
        <a class="nav-link" href="/nps/orgs/view">Orgs</a>
        <a class="nav-link" href="/nps/nominations/view">Nominations</a>
        <a class="nav-link" href="/nps/cycles/view">Cycles</a>
        <a class="nav-link" href="/nps/responses/view">Responses</a>
      </div>
      <div class="navbar-nav">
        <span class="nav-link text-light" id="navUser"></span>
        <a class="nav-link" href="/nps/auth/logout">Logout</a>
      </div>
    </div>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>

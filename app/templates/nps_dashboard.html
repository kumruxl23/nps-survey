{% extends "base.html" %}
{% block title %}NPS Dashboard{% endblock %}

{% block content %}
<div id="loading" class="text-center my-4">
  <div class="spinner-border text-success" role="status"><span class="visually-hidden">Loading...</span></div>
</div>
<div id="no-orgs" class="alert alert-info d-none">No active organizations configured.</div>

<!-- Filter Bar -->
<div class="filter-bar rounded mb-3 d-none" id="filterBar">
  <div class="row g-2 align-items-end">
    <div class="col-auto"><label>Organization</label><select class="form-select form-select-sm" id="filterOrg"><option value="all">All Orgs</option></select></div>
    <div class="col-auto"><label>Cycle</label><select class="form-select form-select-sm" id="filterCycle"><option value="latest">Latest</option></select></div>
    <div class="col-auto"><label>Leader</label><select class="form-select form-select-sm" id="filterLeader"><option value="all">All Leaders</option></select></div>
    <div class="col-auto"><label>Category</label><select class="form-select form-select-sm" id="filterCategory"><option value="all">All</option><option value="Promoter">Promoters</option><option value="Passive">Passives</option><option value="Detractor">Detractors</option></select></div>
    <div class="col-auto"><button class="btn btn-sm btn-outline-light" onclick="clearFilters()">Clear All</button></div>
  </div>
</div>

<!-- Summary Stats Bar -->
<div class="row mb-3 d-none" id="statsBar">
  <div class="col"><div class="stat-card card text-center p-2"><div class="stat-label">NPS Score</div><div class="stat-value" id="statNps">—</div></div></div>
  <div class="col"><div class="stat-card card text-center p-2"><div class="stat-label">Promoters</div><div class="stat-value text-success" id="statP">—</div></div></div>
  <div class="col"><div class="stat-card card text-center p-2"><div class="stat-label">Passives</div><div class="stat-value text-warning" id="statPa">—</div></div></div>
  <div class="col"><div class="stat-card card text-center p-2"><div class="stat-label">Detractors</div><div class="stat-value text-danger" id="statD">—</div></div></div>
  <div class="col"><div class="stat-card card text-center p-2"><div class="stat-label">Response Rate</div><div class="stat-value" id="statRate">—</div></div></div>
  <div class="col"><div class="stat-card card text-center p-2"><div class="stat-label">Pending</div><div class="stat-value text-warning" id="statPend">—</div></div></div>
  <div class="col"><div class="stat-card card text-center p-2"><div class="stat-label">Total Responses</div><div class="stat-value" id="statTotal">—</div></div></div>
</div>

<!-- Tabs -->
<ul class="nav nav-tabs d-none" id="orgTabs" role="tablist"></ul>
<div class="tab-content mt-3" id="orgTabContent"></div>
{% endblock %}

{% block scripts %}
<script>
(function () {
  const loadingEl = document.getElementById('loading');
  const noOrgsEl = document.getElementById('no-orgs');
  const tabsEl = document.getElementById('orgTabs');
  const contentEl = document.getElementById('orgTabContent');
  let allData = {};

  async function fetchJson(url) { const r = await fetch(url); if (!r.ok) throw new Error('HTTP '+r.status); return r.json(); }
  function pct(c,t) { return t===0?'0.0':((c/t)*100).toFixed(1); }
  function npsColor(s) { return s>=50?'text-success':s>=0?'text-warning':'text-danger'; }
  function cycleName(s) { return s.cycle_name||(s.start_date&&s.end_date?s.start_date+' to '+s.end_date:(s.cycle_id||'').substring(0,8)+'...'); }
  function addTab(id,label,active) {
    const li=document.createElement('li'); li.className='nav-item';
    li.innerHTML=`<button class="nav-link ${active?'active':''}" data-bs-toggle="tab" data-bs-target="#${id}" type="button">${label}</button>`;
    tabsEl.appendChild(li);
  }

  function updateStats(data) {
    document.getElementById('statsBar').classList.remove('d-none');
    const nps = data.overall_nps || data.nps_score || 0;
    document.getElementById('statNps').className = 'stat-value ' + npsColor(nps);
    document.getElementById('statNps').textContent = typeof nps==='number'?nps.toFixed(1):nps;
    document.getElementById('statP').textContent = data.total_promoters||data.promoter_count||0;
    document.getElementById('statPa').textContent = data.total_passives||data.passive_count||0;
    document.getElementById('statD').textContent = data.total_detractors||data.detractor_count||0;
    const rate = data.overall_response_rate||data.response_rate||0;
    document.getElementById('statRate').textContent = (rate*100).toFixed(0)+'%';
    document.getElementById('statPend').textContent = data.total_pending||(data.total_nominated-data.total_responded)||0;
    document.getElementById('statTotal').textContent = data.total_responded||0;
  }

  window.clearFilters = function() {
    document.getElementById('filterOrg').value='all';
    document.getElementById('filterCycle').value='latest';
    document.getElementById('filterLeader').value='all';
    document.getElementById('filterCategory').value='all';
  };

  function buildLeaderTable(leaders) {
    if (!leaders||!leaders.length) return '';
    let h=`<div class="card mb-3"><div class="card-body p-2"><h6 class="mb-2">Leader Breakdown</h6>
      <table class="table table-sm table-hover mb-0"><thead class="table-light"><tr>
        <th>Leader</th><th class="text-center">Nom</th><th class="text-center">Resp</th>
        <th class="text-center">Pend</th><th class="text-center">Rate</th>
        <th class="text-center">P</th><th class="text-center">Pa</th><th class="text-center">D</th>
        <th class="text-center">NPS</th></tr></thead><tbody>`;
    for (const l of leaders) {
      h+=`<tr><td><strong>${l.leader}</strong></td>
        <td class="text-center">${l.nominated}</td><td class="text-center">${l.responded}</td>
        <td class="text-center">${l.pending>0?'<span class="badge bg-warning text-dark">'+l.pending+'</span>':'0'}</td>
        <td class="text-center">${(l.response_rate*100).toFixed(0)}%</td>
        <td class="text-center text-success">${l.promoter_count}</td>
        <td class="text-center text-warning">${l.passive_count}</td>
        <td class="text-center text-danger">${l.detractor_count}</td>
        <td class="text-center"><strong class="${npsColor(l.nps_score)}">${l.nps_score.toFixed(1)}</strong></td></tr>`;
    }
    h+='</tbody></table></div></div>';
    return h;
  }

  function buildSummaryPane(data, active) {
    let h=`<div class="tab-pane fade ${active?'show active':''}" id="pane-summary" role="tabpanel">`;
    if (data.org_summaries&&data.org_summaries.length) {
      h+=`<div class="card mb-3"><div class="card-body p-2"><h6 class="mb-2">Organization Comparison</h6>
        <table class="table table-sm table-hover mb-0"><thead class="table-light"><tr>
          <th>Organization</th><th>Cycle</th><th class="text-center">NPS</th>
          <th class="text-center">Nom</th><th class="text-center">Resp</th><th class="text-center">Pend</th>
          <th class="text-center">Rate</th><th class="text-center">P</th><th class="text-center">Pa</th><th class="text-center">D</th>
        </tr></thead><tbody>`;
      for (const o of data.org_summaries) {
        const p=o.total_nominated-o.total_responded;
        h+=`<tr><td><strong>${o.org_name}</strong></td><td>${o.cycle_name}</td>
          <td class="text-center"><strong class="${npsColor(o.nps_score)}">${o.nps_score}</strong></td>
          <td class="text-center">${o.total_nominated}</td><td class="text-center">${o.total_responded}</td>
          <td class="text-center">${p>0?'<span class="badge bg-warning text-dark">'+p+'</span>':'0'}</td>
          <td class="text-center">${(o.response_rate*100).toFixed(0)}%</td>
          <td class="text-center text-success">${o.promoter_count}</td>
          <td class="text-center text-warning">${o.passive_count}</td>
          <td class="text-center text-danger">${o.detractor_count}</td></tr>`;
      }
      h+='</tbody></table></div></div>';
    }
    h+='</div>';
    return h;
  }

  function buildOrgPane(org, summaries, leaders, active) {
    const latest=summaries.length?summaries[summaries.length-1]:null;
    let h=`<div class="tab-pane fade ${active?'show active':''}" id="pane-${org.org_id}" role="tabpanel">`;
    if (!latest) { h+='<p class="text-muted">No survey cycles found.</p></div>'; return h; }
    h+=`<p class="text-muted mb-2">Cycle: ${cycleName(latest)} | Nominated: ${latest.total_nominated} | Responded: ${latest.total_responded}</p>`;
    h+=buildLeaderTable(leaders);
    if (summaries.length>1) {
      h+=`<div class="card mb-3"><div class="card-body p-2"><h6 class="mb-2">Trend</h6>
        <table class="table table-sm table-striped mb-0"><thead><tr><th>Cycle</th><th>NPS</th><th>P</th><th>Pa</th><th>D</th><th>Resp</th><th>Rate</th></tr></thead><tbody>`;
      for (const s of summaries) {
        h+=`<tr><td>${cycleName(s)}</td><td><strong class="${npsColor(s.nps_score)}">${s.nps_score.toFixed(1)}</strong></td>
          <td>${s.promoter_count}</td><td>${s.passive_count}</td><td>${s.detractor_count}</td>
          <td>${s.total_responded}/${s.total_nominated}</td><td>${(s.response_rate*100).toFixed(0)}%</td></tr>`;
      }
      h+='</tbody></table></div></div>';
    }
    h+='</div>';
    return h;
  }

  async function loadDashboard() {
    try {
      const orgs = await fetchJson('/nps/orgs');
      const activeOrgs = orgs.filter(o=>o.is_active);
      loadingEl.classList.add('d-none');
      if (!activeOrgs.length) { noOrgsEl.classList.remove('d-none'); return; }

      document.getElementById('filterBar').classList.remove('d-none');
      tabsEl.classList.remove('d-none');

      // Populate org filter
      const filterOrg = document.getElementById('filterOrg');
      for (const o of activeOrgs) {
        const opt = document.createElement('option');
        opt.value = o.org_id; opt.textContent = o.org_name;
        filterOrg.appendChild(opt);
      }

      // Summary tab
      addTab('pane-summary','All Orgs',true);
      const summary = await fetchJson('/nps/dashboard/summary');
      updateStats(summary);
      contentEl.insertAdjacentHTML('beforeend', buildSummaryPane(summary, true));

      // Org tabs
      for (const org of activeOrgs) {
        addTab('pane-'+org.org_id, org.org_name, false);
        let summaries=[];
        try { summaries=await fetchJson('/nps/dashboard?org_id='+encodeURIComponent(org.org_id));
          if (!Array.isArray(summaries)) summaries=[summaries]; } catch(e){}
        let leaders=[];
        if (summaries.length) {
          try { leaders=await fetchJson('/nps/dashboard/leaders?org_id='+encodeURIComponent(org.org_id)+'&cycle_id='+encodeURIComponent(summaries[summaries.length-1].cycle_id)); } catch(e){}
          // Populate leader filter
          const fl=document.getElementById('filterLeader');
          for (const l of leaders) {
            if (!fl.querySelector(`option[value="${l.leader}"]`)) {
              const o=document.createElement('option'); o.value=l.leader; o.textContent=l.leader; fl.appendChild(o);
            }
          }
        }
        contentEl.insertAdjacentHTML('beforeend', buildOrgPane(org, summaries, leaders, false));
      }

      // Tab change updates stats
      tabsEl.addEventListener('click', async function(e) {
        const btn=e.target.closest('button');
        if (!btn) return;
        const target=btn.getAttribute('data-bs-target');
        if (target==='#pane-summary') { updateStats(summary); return; }
        const orgId=target.replace('#pane-','');
        try {
          const s=await fetchJson('/nps/dashboard?org_id='+encodeURIComponent(orgId));
          const latest=Array.isArray(s)?s[s.length-1]:s;
          if (latest) updateStats(latest);
        } catch(e){}
      });
    } catch(err) {
      loadingEl.classList.add('d-none');
      noOrgsEl.textContent='Error: '+err.message;
      noOrgsEl.classList.remove('d-none');
    }
  }
  loadDashboard();
})();
</script>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}NPS Survey Tool{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .whs-header { background: linear-gradient(135deg, #1a472a 0%, #2d5a3f 100%); }
    .whs-header .navbar-brand { font-weight: 700; font-size: 1.1rem; }
    .whs-logo { height: 36px; margin-right: 10px; }
    .filter-bar { background: #f8f9fa; border-bottom: 2px solid #dee2e6; padding: 8px 0; }
    .stat-card { border: none; border-radius: 8px; }
    .stat-card .display-4 { font-size: 2.5rem; font-weight: 700; }
    .stat-card .display-6 { font-size: 1.5rem; font-weight: 600; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark whs-header mb-0">
    <div class="container-fluid px-4">
      <a class="navbar-brand d-flex align-items-center" href="/nps/dashboard">
        <span class="fw-bold text-white" style="font-size:1.3rem">WHS</span>
        <span class="text-white-50 ms-2" style="font-size:0.8rem">Workplace Health & Safety</span>
      </a>
      <span class="navbar-text text-white fw-bold mx-auto" style="font-size:1.2rem">NPS Dashboard</span>
      <div class="navbar-nav">
        <a class="nav-link" href="/nps/dashboard">Dashboard</a>
        <a class="nav-link" href="/nps/orgs/view">Orgs</a>
        <a class="nav-link" href="/nps/nominations/view">Nominations</a>
        <a class="nav-link" href="/nps/cycles/view">Cycles</a>
        <a class="nav-link" href="/nps/responses/view">Responses</a>
        <a class="nav-link text-warning" href="/nps/auth/logout">Logout</a>
      </div>
    </div>
  </nav>
  <div class="container-fluid px-4 mt-3">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>

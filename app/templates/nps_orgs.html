{% extends "base.html" %}
{% block title %}Org Configuration{% endblock %}

{% block content %}
<h2>Organization Configuration</h2>

<!-- Add Org Form -->
<div class="card mb-4">
  <div class="card-header">Add New Organization</div>
  <div class="card-body">
    <form id="addOrgForm">
      <div class="row g-2 mb-2">
        <div class="col-md-3">
          <input type="text" class="form-control" name="org_id" placeholder="Org ID" required>
        </div>
        <div class="col-md-3">
          <input type="text" class="form-control" name="org_name" placeholder="Org Name" required>
        </div>
        <div class="col-md-3">
          <input type="text" class="form-control" name="asana_project_gid" placeholder="ASANA Project GID" required>
        </div>
        <div class="col-md-3">
          <input type="url" class="form-control" name="asana_form_url" placeholder="ASANA Form URL" required>
        </div>
      </div>
      <div class="row g-2 mb-2">
        <div class="col-md-3">
          <input type="text" class="form-control" name="custom_field_nps_score_gid" placeholder="NPS Score Field GID" required>
        </div>
        <div class="col-md-3">
          <input type="text" class="form-control" name="custom_field_category_gid" placeholder="Category Field GID" required>
        </div>
        <div class="col-md-3">
          <input type="text" class="form-control" name="custom_field_org_name_gid" placeholder="Org Name Field GID" required>
        </div>
        <div class="col-md-3">
          <input type="text" class="form-control" name="quip_doc_id" placeholder="Quip Doc ID (optional)">
        </div>
      </div>
      <button type="submit" class="btn btn-primary">Add Organization</button>
    </form>
    <div id="addResult" class="mt-2"></div>
  </div>
</div>

<!-- Org List -->
<div class="card">
  <div class="card-header">Configured Organizations</div>
  <div class="card-body">
    <div id="orgLoading" class="text-center"><div class="spinner-border spinner-border-sm"></div> Loading...</div>
    <table class="table table-sm d-none" id="orgTable">
      <thead>
        <tr>
          <th>Org ID</th><th>Name</th><th>ASANA Project GID</th>
          <th>Active</th><th>Created</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="orgTableBody"></tbody>
    </table>
  </div>
</div>

<!-- Update Org Modal -->
<div class="modal fade" id="updateOrgModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Update Organization</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="updateOrgForm">
          <input type="hidden" name="org_id" id="updateOrgId">
          <div class="mb-2">
            <label class="form-label">Org Name</label>
            <input type="text" class="form-control" name="org_name" id="updateOrgName">
          </div>
          <div class="mb-2">
            <label class="form-label">ASANA Project GID</label>
            <input type="text" class="form-control" name="asana_project_gid" id="updateAsanaGid">
          </div>
          <div class="mb-2">
            <label class="form-label">ASANA Form URL</label>
            <input type="url" class="form-control" name="asana_form_url" id="updateFormUrl">
          </div>
          <div class="mb-2">
            <label class="form-label">Quip Doc ID</label>
            <input type="text" class="form-control" name="quip_doc_id" id="updateQuipDoc">
          </div>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
        <div id="updateResult" class="mt-2"></div>
      </div>
    </div>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script>
(function () {
  const tbody = document.getElementById('orgTableBody');
  const table = document.getElementById('orgTable');
  const loading = document.getElementById('orgLoading');

  async function postJson(url, data) {
    const resp = await fetch(url, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    return { ok: resp.ok, status: resp.status, data: await resp.json() };
  }

  async function loadOrgs() {
    try {
      const resp = await fetch('/nps/orgs');
      const orgs = await resp.json();
      loading.classList.add('d-none');
      table.classList.remove('d-none');
      tbody.innerHTML = '';
      for (const o of orgs) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${o.org_id}</td>
          <td>${o.org_name}</td>
          <td>${o.asana_project_gid}</td>
          <td>${o.is_active ? '<span class="badge bg-success">Active</span>' : '<span class="badge bg-secondary">Inactive</span>'}</td>
          <td>${o.created_at || '—'}</td>
          <td>
            <button class="btn btn-sm btn-outline-primary btn-edit" data-org='${JSON.stringify(o)}'>Edit</button>
            ${o.is_active ? `<button class="btn btn-sm btn-outline-danger btn-deactivate" data-orgid="${o.org_id}">Deactivate</button>` : ''}
          </td>`;
        tbody.appendChild(tr);
      }
      attachActions();
    } catch (err) {
      loading.textContent = 'Error loading orgs: ' + err.message;
    }
  }

  function attachActions() {
    document.querySelectorAll('.btn-edit').forEach(btn => {
      btn.addEventListener('click', function () {
        const o = JSON.parse(this.dataset.org);
        document.getElementById('updateOrgId').value = o.org_id;
        document.getElementById('updateOrgName').value = o.org_name;
        document.getElementById('updateAsanaGid').value = o.asana_project_gid;
        document.getElementById('updateFormUrl').value = o.asana_form_url;
        document.getElementById('updateQuipDoc').value = o.quip_doc_id || '';
        new bootstrap.Modal(document.getElementById('updateOrgModal')).show();
      });
    });
    document.querySelectorAll('.btn-deactivate').forEach(btn => {
      btn.addEventListener('click', async function () {
        if (!confirm('Deactivate this organization?')) return;
        const res = await postJson('/nps/orgs/remove', { org_id: this.dataset.orgid });
        if (res.ok) loadOrgs();
        else alert('Error: ' + (res.data.error || 'Unknown'));
      });
    });
  }

  // Add org form
  document.getElementById('addOrgForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    const fd = new FormData(this);
    const data = Object.fromEntries(fd.entries());
    const res = await postJson('/nps/orgs/add', data);
    const el = document.getElementById('addResult');
    if (res.ok) {
      el.innerHTML = '<div class="alert alert-success py-1">Organization added.</div>';
      this.reset();
      loadOrgs();
    } else {
      el.innerHTML = `<div class="alert alert-danger py-1">${res.data.error || 'Error'}</div>`;
    }
  });

  // Update org form
  document.getElementById('updateOrgForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    const fd = new FormData(this);
    const data = Object.fromEntries(fd.entries());
    const res = await postJson('/nps/orgs/update', data);
    const el = document.getElementById('updateResult');
    if (res.ok) {
      el.innerHTML = '<div class="alert alert-success py-1">Updated.</div>';
      bootstrap.Modal.getInstance(document.getElementById('updateOrgModal')).hide();
      loadOrgs();
    } else {
      el.innerHTML = `<div class="alert alert-danger py-1">${res.data.error || 'Error'}</div>`;
    }
  });

  loadOrgs();
})();
</script>
{% endblock %}
